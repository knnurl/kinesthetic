# .github/workflows/build.yml
# Compiles the INPUT_TOF_WIFI build of kinetic_sculpture.ino and publishes
# firmware.bin to a rolling "latest" release. Push the sketch, wait ~1-2 min,
# then update from the phone (Setup -> Download & install).
#
# Expected repo layout: kinetic_sculpture.ino at the repo root.
# The phone pull URL is one of (both stable):
#   https://github.com/<you>/<repo>/releases/download/latest/firmware.bin
#   https://github.com/<you>/<repo>/releases/latest/download/firmware.bin

name: build-firmware

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you also trigger a build by hand

permissions:
  contents: write           # needed to publish the release asset

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 core and libraries
        run: |
          arduino-cli config init --additional-urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install \
            "FastAccelStepper" \
            "TMCStepper" \
            "WebSockets" \
            "ArduinoJson"

      - name: Force INPUT_TOF_WIFI build flag
        run: |
          sed -i 's/\r$//' kinetic_sculpture.ino       # normalize Windows CRLF endings
          sed -E -i \
            -e 's|^(// *)?#define INPUT_TOF$|// #define INPUT_TOF|' \
            -e 's|^(// *)?#define INPUT_POT_BTN$|// #define INPUT_POT_BTN|' \
            -e 's|^(// *)?#define INPUT_TOF_WIFI$|#define INPUT_TOF_WIFI|' \
            kinetic_sculpture.ino
          echo "Active build flags:"
          grep -nE '^[[:space:]]*#define INPUT_' kinetic_sculpture.ino || true

      - name: Arrange and inspect sketch
        run: |
          echo "== repo root =="; ls -la
          echo "== sketch size =="; wc -l kinetic_sculpture.ino
          op=$(grep -c 'R"rawliteral(' kinetic_sculpture.ino || true)
          cl=$(grep -c ')rawliteral";' kinetic_sculpture.ino || true)
          echo "== page raw-string wrapper: openers=$op closers=$cl (need 1 and 1) =="
          if [ "$op" != "1" ] || [ "$cl" != "1" ]; then
            echo "ERROR: the web-page raw-string wrapper is broken. The kinetic_sculpture.ino"
            echo "at the repo root is a corrupted copy - re-upload the clean downloaded file."
            exit 1
          fi
          grep -nE 'void[[:space:]]+(setup|loop)[[:space:]]*\(\)' kinetic_sculpture.ino \
            || { echo "ERROR: no setup()/loop() - wrong or empty file at repo root"; exit 1; }
          mkdir -p sketch/kinetic_sculpture
          cp kinetic_sculpture.ino sketch/kinetic_sculpture/kinetic_sculpture.ino

      - name: Compile
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32c3:PartitionScheme=min_spiffs \
            --output-dir output \
            sketch/kinetic_sculpture
          cp output/kinetic_sculpture.ino.bin firmware.bin
          ls -lh firmware.bin

      - name: Publish to rolling "latest" release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest firmware
          files: firmware.bin
          prerelease: false
          make_latest: "true"
